name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ExcelPerfDiag.sln

      - name: Build
        run: dotnet build ExcelPerfDiag.sln -c Release --no-restore

      # Hosted runners have no Excel install, so Excel-gated integration tests
      # (Trait Category=Excel) are excluded here and run on a self-hosted runner / locally.
      - name: Test (no-Excel)
        run: dotnet test ExcelPerfDiag.sln -c Release --no-build --filter "Category!=Excel"
